name: Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Syntax Check - YARA
        run: |
          sudo apt-get install -y yara
          # Find all .yar files and check syntax
          find . -name "*.yar" -print0 | xargs -0 -r -I {} yara {} /dev/null

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # v4
        with:
          python-version: '3.x'

      - name: Install Sigma CLI
        run: pip install sigma-cli

      - name: Syntax Check - Sigma
        run: |
          # Validate Sigma rules
          find packs -name "*.yml" -path "*/sigma/*" -print0 | xargs -0 -I {} sigma check {}

      - name: Syntax Check - Suricata
        run: |
          # Placeholder for Suricata validation using suricata -T
          echo "Validating Suricata rules..."
          find . -name "*.rules"
